<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Explodium Playtest</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <link rel="stylesheet" href="/games/explodium/styles.css" />
    <link rel="stylesheet" href="/games/toy-battle/styles.css" />
    <link rel="stylesheet" href="/games/flip-triples/styles.css" />
    <link rel="stylesheet" href="/games/truck-mania/styles.css" />
    <link rel="stylesheet" href="/games/uber-mania/styles.css" />
    <link rel="stylesheet" href="/games/lino/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <main class="shell">
      <section id="screen-home" class="screen screen-active">
        <div id="game-list" class="game-list single" aria-live="polite"></div>
      </section>

      <section id="screen-lobby" class="screen">
        <h2>Lobby</h2>
        <p class="lead" id="lobby-game">Game: <strong id="lobby-game-name">-</strong></p>
        <p class="lead" id="lobby-status">Waiting for another player...</p>
        <div class="panel">
          <div class="panel-row">
            <span>Your status</span>
            <strong id="player-status">Queued</strong>
          </div>
          <div class="panel-row">
            <span>Players needed</span>
            <strong id="players-needed">1</strong>
          </div>
        </div>
        <button id="cancel-button" class="ghost-btn">Cancel</button>
      </section>

      <section id="screen-game" class="screen">
        <div class="game-header">
          <h2 id="game-title">Explodium</h2>
          <span id="turn-status" class="turn-status">Waiting for match...</span>
          <span id="bot-thinking" class="bot-thinking hidden" aria-label="Bot is thinking" role="status">
            <span></span><span></span><span></span>
          </span>
        </div>
        <div id="flip-setup" class="flip-setup hidden" aria-live="polite"></div>
        <div class="play-area">
          <div class="board" id="game-board" role="grid" aria-label="Game board"></div>
          <div id="flip-phase-indicator" class="flip-phase-indicator hidden" aria-live="polite"></div>
        </div>
        <div id="flip-phase2-banner" class="flip-phase2-banner hidden" aria-live="polite"></div>
        <div class="hand" id="hand"></div>
        <div class="game-footer">
          <button id="flip-undo-btn" class="ghost-btn flip-undo hidden">Undo move</button>
          <button id="exit-button" class="ghost-btn">Leave Game</button>
        </div>
      </section>
    </main>

    <div id="solo-picker" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Choose opponent">
      <div class="modal-card">
        <h3 id="solo-picker-title">Solo play</h3>
        <p class="modal-sub">Choose your opponent</p>
        <div class="solo-picker-options">
          <button type="button" class="solo-opt" data-bot="none">
            <strong>None</strong>
            <small>Play against yourself</small>
          </button>
          <button type="button" class="solo-opt" data-bot="0">
            <strong>Baby bot</strong>
            <small>Mostly wings it — great for learning</small>
          </button>
          <button type="button" class="solo-opt" data-bot="1">
            <strong>Bot — Level 1</strong>
            <small>Decent moves, frequent slips</small>
          </button>
          <button type="button" class="solo-opt" data-bot="2">
            <strong>Bot — Level 2</strong>
            <small>Sharp, with the occasional blunder</small>
          </button>
          <button type="button" class="solo-opt" data-bot="3">
            <strong>Bot — Level 3</strong>
            <small>Always its best move; perfect endgame</small>
          </button>
          <button type="button" class="solo-opt" data-bot="4">
            <strong>God bot</strong>
            <small>Thinks 4.5s a move — bring a plan</small>
          </button>
        </div>
        <button type="button" class="ghost-btn solo-picker-cancel">Cancel</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/shared/app.js"></script>
  </body>
</html>
